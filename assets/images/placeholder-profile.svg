<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#e8e8e8"/>
  <!-- Silhouette -->
  <circle cx="200" cy="155" r="68" fill="#b0b0b0"/>
  <ellipse cx="200" cy="360" rx="115" ry="88" fill="#b0b0b0"/>
  <!-- Subtle grain overlay via pattern -->
  <defs>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="rgba(0,0,0,0.03)"/>
      <rect x="2" y="2" width="1" height="1" fill="rgba(0,0,0,0.03)"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grain)"/>
  <!-- Label -->
  <text x="200" y="292" font-family="Montserrat, sans-serif" font-size="11" font-weight="600" letter-spacing="3" text-anchor="middle" fill="#888888">FOTO PROFILO</text>
</svg>
